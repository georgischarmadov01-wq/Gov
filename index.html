    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){ return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'); }); }
    function renderCards(items) {
        const container = document.getElementById('cardsContainer');
        const countSpan = document.getElementById('resultCount');
        if (!items.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-info-circle"></i> Ничего не найдено. Попробуйте другой фильтр.</div>'; countSpan.innerText = '0'; return; }
        countSpan.innerText = items.length;
        container.innerHTML = items.map(item => `
            <div class="org-card">
                <div class="card-header">
                    <div class="org-name">
                        <i class="fas ${item.type === 'pref' ? 'fa-city' : 'fa-building'}"></i>
                        ${escapeHtml(item.name)}
                        <span class="tag ${item.type === 'pref' ? 'tag-pref' : ''}">${item.type === 'pref' ? 'Префектура' : 'Управа'}</span>
                    </div>
                    <div class="district"><i class="fas fa-location-dot"></i> ${escapeHtml(item.district)}</div>
                </div>
                <div class="card-body">
                    <div class="info-row"><i class="fas fa-map-pin"></i> <span class="address">${escapeHtml(item.address)}</span></div>
                    <div class="info-row"><i class="fas fa-phone-alt"></i> <a href="tel:${item.phone.replace(/[^0-9+]/g, '')}">${escapeHtml(item.phone)}</a></div>
                    <div class="info-row"><i class="fas fa-subway"></i> <span class="metro-badge">${escapeHtml(item.metro)}</span></div>
                    <div><i class="fas fa-route"></i> <span class="route-text">🚶 ${escapeHtml(item.route)}</span></div>
                </div>
                <div class="footer-card"><span><i class="far fa-clock"></i> пн-чт 8:00–17:00, пт 8:00–15:45</span><span><i class="fas fa-check-circle"></i> Администрация г. Москвы</span></div>
            </div>
        `).join('');
    }
    function filterData() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const typeVal = document.getElementById('typeFilter').value;
        const distVal = document.getElementById('districtFilter').value;
        let filtered = data.filter(item => {
            let matchSearch = !searchTerm || item.name.toLowerCase().includes(searchTerm) || item.address.toLowerCase().includes(searchTerm) || item.metro.toLowerCase().includes(searchTerm);
            let matchType = typeVal === 'all' || item.type === typeVal;
            let matchDist = distVal === 'all' || item.district === distVal;
            return matchSearch && matchType && matchDist;
        });
        renderCards(filtered);
    }
    document.getElementById('searchInput').addEventListener('input', filterData);
    document.getElementById('typeFilter').addEventListener('change', filterData);
    document.getElementById('districtFilter').addEventListener('change', filterData);
    renderCards(data);
</script>
